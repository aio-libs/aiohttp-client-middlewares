version: 2
updates:

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    labels:
      - dependencies
    schedule:
      interval: "weekly"

  # Maintain Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    allow:
      - dependency-type: "all"
    labels:
      - dependencies
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
