[flake8]
extend-select =
  B950,
# TODO: don't disable D*, fix up issues instead
ignore = N801,N802,N803,E203,E226,E305,E252,E301,E302,E501,E704,W503,W504,D1,D4
max-line-length = 88
exclude =
    .git,
    __pycache__,
    build,
    dist,
    docs,
per-file-ignores =
    # Tests don't need docstrings and may shadow builtins/fixtures.
    tests/*:D,F811

[isort]
profile=black
line_length=88
include_trailing_comma=True
multi_line_output=3
force_grid_wrap=0
combine_as_imports=True

known_third_party=aiohttp,yarl,pytest
known_first_party=aiohttp_client_middlewares
